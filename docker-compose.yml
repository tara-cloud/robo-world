services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: robo_world
      POSTGRES_USER: robo_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - robo_world_pg_data:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  server:
    image: pmananthu/robo-world:${VERSION:-latest}
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://robo_user:${DB_PASSWORD}@postgres:5432/robo_world
      MQTT_URL: mqtt://mosquitto:1883
      PORT: 4000
      POCKET_URL: http://192.168.0.107:30600
      POCKET_TOKEN: ${POCKET_TOKEN:-change-me-pocket-master-key}
    depends_on:
      - postgres
      - mosquitto

volumes:
  robo_world_pg_data:
