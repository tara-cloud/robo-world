name: Deploy to Pi

on:
  workflow_run:
    workflows: ['Build & Push Docker Image']
    types: [completed]

jobs:
  deploy:
    # Runs directly on the Pi — has local kubectl/helm access
    runs-on: [self-hosted, pi]
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from triggering tag
        id: version
        run: |
          REF="${{ github.event.workflow_run.head_branch }}"
          VERSION="${REF#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying robo-world:$VERSION"

      - name: Pre-pull image into k8s.io namespace
        run: |
          sudo ctr --namespace k8s.io images pull \
            docker.io/pmananthu/robo-world:${{ steps.version.outputs.version }}

      - name: Package helm chart
        run: |
          cd helm
          tar czf /tmp/robo-world-chart.tar.gz robo-world/
          cd /tmp && tar xzf robo-world-chart.tar.gz

      - name: Backup database
        run: |
          mkdir -p /DATA/AppData/robo-world/backups
          sudo kubectl exec -n robo-world deploy/robo-world-postgres -- \
            pg_dump -U robo_user robo_world \
            > /DATA/AppData/robo-world/backups/pre-deploy-$(date +%Y%m%d-%H%M%S).sql || true

      - name: Helm upgrade
        run: |
          sudo KUBECONFIG=/etc/rancher/k3s/k3s.yaml \
            helm upgrade robo-world /tmp/robo-world \
            --namespace robo-world \
            --reuse-values \
            --set image.tag=${{ steps.version.outputs.version }}

      - name: Restart pod
        run: |
          sudo kubectl delete pods -n robo-world -l app=robo-world --force 2>/dev/null || true

      - name: Wait for rollout
        run: |
          sudo kubectl rollout status deployment/robo-world \
            -n robo-world --timeout=120s

      - name: Health check
        run: |
          sleep 5
          curl -sf http://localhost:30400/health
