name: Deploy to Pi

on:
  workflow_run:
    workflows: ['Build & Push Docker Image']
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from triggering tag
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          # workflow_run gives the branch; for tags it's the tag name
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package helm chart
        run: |
          cd helm
          tar czf /tmp/robo-world-chart.tar.gz robo-world/

      - name: Copy helm chart to Pi
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          password: ${{ secrets.PI_PASSWORD }}
          source:   /tmp/robo-world-chart.tar.gz
          target:   /tmp/

      - name: Helm upgrade + pre-pull image on Pi
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          password: ${{ secrets.PI_PASSWORD }}
          script: |
            set -e
            VERSION="${{ steps.version.outputs.version }}"

            # Pre-pull into k8s.io namespace to avoid CDN cache misses
            sudo ctr --namespace k8s.io images pull \
              docker.io/pmananthu/robo-world:${VERSION}

            # Backup DB
            mkdir -p /DATA/AppData/robo-world/backups
            sudo kubectl exec -n robo-world deploy/robo-world-postgres -- \
              pg_dump -U robo_user robo_world \
              > /DATA/AppData/robo-world/backups/pre-deploy-$(date +%Y%m%d-%H%M%S).sql || true

            # Helm upgrade
            cd /tmp && tar xzf robo-world-chart.tar.gz
            sudo KUBECONFIG=/etc/rancher/k3s/k3s.yaml \
              helm upgrade robo-world /tmp/robo-world \
              --namespace robo-world \
              --reuse-values \
              --set image.tag=${VERSION}

            # Kill old pod so new one can claim the hostPort
            sudo kubectl delete pods -n robo-world -l app=robo-world --force 2>/dev/null || true

            # Wait for rollout
            sudo kubectl rollout status deployment/robo-world \
              -n robo-world --timeout=120s
