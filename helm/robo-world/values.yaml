# Robo World Helm Chart — default values

image:
  repository: pmananthu/robo-world
  tag: "1.4.6"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: NodePort
  port: 4000
  nodePort: 30400

# MQTT (Mosquitto) — devices connect on port 1883 directly
mosquitto:
  image: eclipse-mosquitto:2
  hostPort: 1883

# PostgreSQL
postgres:
  image: postgres:16-alpine
  database: robo_world
  user: robo_user
  password: robo_secure_pass
  dataPath: /var/lib/robo-world/postgres
  storageSize: 2Gi

# App config
app: {}

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

probes:
  initialDelaySeconds: 15
  periodSeconds: 30
