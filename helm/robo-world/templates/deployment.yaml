# ── PostgreSQL ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robo-world-postgres
  namespace: robo-world
spec:
  replicas: 1
  selector:
    matchLabels:
      app: robo-world-postgres
  template:
    metadata:
      labels:
        app: robo-world-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: robo-world-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: pgdata
          hostPath:
            path: {{ .Values.postgres.dataPath }}
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: robo-world-postgres
  namespace: robo-world
spec:
  selector:
    app: robo-world-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# ── Robo World Server ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robo-world
  namespace: robo-world
  labels:
    app: robo-world
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: robo-world
  template:
    metadata:
      labels:
        app: robo-world
        version: {{ .Values.image.tag | quote }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc robo-world-postgres 5432 -w 1 </dev/null; do echo waiting; sleep 3; done']
      containers:
        - name: robo-world
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4000
              hostPort: {{ .Values.service.nodePort }}
            - name: socket
              containerPort: {{ .Values.socket.port }}
              hostPort: {{ .Values.socket.hostPort }}
          env:
            - name: PORT
              value: "4000"
            - name: SOCKET_PORT
              value: {{ .Values.socket.port | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: robo-world-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: {{ .Values.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: robo-world
  namespace: robo-world
  labels:
    app: robo-world
spec:
  selector:
    app: robo-world
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      nodePort: {{ .Values.service.nodePort }}
