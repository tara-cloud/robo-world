<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electro</title>
  <style>
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --surface2:#1f2235;
      --border:  #2a2d3a;
      --accent:  #6c63ff;
      --green:   #22c55e;
      --yellow:  #eab308;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --orange:  #f97316;
      --purple:  #a855f7;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --radius:  8px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow:hidden; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header { display:flex; align-items:center; gap:10px; padding:12px 18px; border-bottom:1px solid var(--border); height:50px; }
    header h1 { font-size:1rem; font-weight:700; letter-spacing:.04em; color:var(--accent); }
    .hdr-right { margin-left:auto; display:flex; gap:8px; }

    /* ── 3-column layout ─────────────────────────────────────────────────── */
    main { display:grid; grid-template-columns:180px 250px 1fr; height:calc(100vh - 50px); overflow:hidden; }

    /* ── Shared column styles ─────────────────────────────────────────────── */
    .col { border-right:1px solid var(--border); overflow-y:auto; display:flex; flex-direction:column; }
    .col-hdr { display:flex; align-items:center; justify-content:space-between; padding:10px 12px 6px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .col-hdr span { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
    .col-body { padding:10px; flex:1; overflow-y:auto; }

    /* ── Project cards ───────────────────────────────────────────────────── */
    .proj-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:9px 11px; margin-bottom:7px; cursor:pointer; transition:border-color .15s; }
    .proj-card:hover, .proj-card.active { border-color:var(--accent); }
    .proj-card .pname { font-weight:600; font-size:.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .proj-card .pmeta { display:flex; gap:8px; margin-top:4px; font-size:.7rem; color:var(--muted); }

    /* Unassigned group */
    .unassigned-hdr { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin:12px 0 6px; padding:0 2px; }

    /* ── Middle panel: devices + services ───────────────────────────────── */
    .section-title { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin:10px 0 6px; }
    .dev-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:9px 11px; margin-bottom:7px; cursor:pointer; transition:border-color .15s; }
    .dev-card:hover, .dev-card.active { border-color:var(--accent); }
    .dev-card .dname { font-weight:600; font-size:.85rem; }
    .dev-card .did   { font-size:.68rem; color:var(--muted); font-family:monospace; margin-top:1px; }
    .dev-card .dmeta { display:flex; gap:6px; margin-top:5px; align-items:center; flex-wrap:wrap; }

    .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .status-dot.online  { background:var(--green); }
    .status-dot.offline { background:var(--red); }
    .status-dot.unknown { background:var(--muted); }

    /* Inline form */
    .inline-form { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:10px; margin-bottom:8px; display:flex; flex-direction:column; gap:7px; }
    .inline-form input, .inline-form select { background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:5px; padding:5px 8px; font-size:.78rem; width:100%; }
    .inline-form input:focus { outline:none; border-color:var(--accent); }
    .inline-form .row { display:flex; gap:6px; }
    .inline-form label { font-size:.7rem; color:var(--muted); display:block; margin-bottom:2px; }

    /* ── Right panel ─────────────────────────────────────────────────────── */
    #detail { overflow-y:auto; display:flex; flex-direction:column; }
    #detail.empty { align-items:center; justify-content:center; }
    .empty-msg { color:var(--muted); font-size:.9rem; }

    /* ── Tabs ────────────────────────────────────────────────────────────── */
    .tabs { display:flex; border-bottom:1px solid var(--border); padding:0 18px; background:var(--surface); position:sticky; top:0; z-index:10; }
    .tab  { padding:11px 14px; font-size:.78rem; cursor:pointer; border-bottom:2px solid transparent; color:var(--muted); white-space:nowrap; }
    .tab:hover  { color:var(--text); }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-content { display:none; padding:18px; flex-direction:column; gap:14px; }
    .tab-content.active { display:flex; }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
    .card h3 { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:12px; }
    .health-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .stat .val { font-size:1.3rem; font-weight:700; }
    .stat .lbl { font-size:.68rem; color:var(--muted); margin-top:2px; }

    /* ── Badges ──────────────────────────────────────────────────────────── */
    .badge { font-size:.65rem; padding:2px 7px; border-radius:999px; font-weight:600; }
    .badge.online  { background:#166534; color:#bbf7d0; }
    .badge.offline { background:#7f1d1d; color:#fecaca; }
    .badge.input   { background:#1e3a5f; color:#93c5fd; }
    .badge.output  { background:#431407; color:#fdba74; }
    .badge.i2c     { background:#3b0764; color:#d8b4fe; }
    .badge.power   { background:#422006; color:#fde68a; }
    .badge.type    { background:var(--surface2); color:var(--muted); }

    /* ── Tables ──────────────────────────────────────────────────────────── */
    table { width:100%; border-collapse:collapse; font-size:.8rem; }
    th,td { padding:7px 10px; border-bottom:1px solid var(--border); text-align:left; vertical-align:middle; }
    th { color:var(--muted); font-weight:500; font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; }
    tr:last-child td { border-bottom:none; }
    code { font-family:monospace; font-size:.75rem; background:var(--bg); padding:1px 5px; border-radius:3px; }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn { padding:7px 13px; border:none; border-radius:var(--radius); cursor:pointer; font-size:.8rem; font-weight:600; transition:opacity .15s; }
    .btn:hover { opacity:.85; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-ghost   { background:transparent; border:1px solid var(--border); color:var(--text); }
    .btn-danger  { background:transparent; border:1px solid var(--red); color:var(--red); }
    .btn-green   { background:var(--green); color:#000; }
    .btn-sm      { padding:3px 9px; font-size:.72rem; }

    /* ── Pipeline / Hardware forms ───────────────────────────────────────── */
    .pipeline-form { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:14px; display:flex; flex-direction:column; gap:9px; margin-bottom:12px; }
    .pipeline-form .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .pipeline-form label { font-size:.72rem; color:var(--muted); display:block; margin-bottom:3px; }
    .pipeline-form input, .pipeline-form select, .pipeline-form textarea { background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:5px; padding:6px 10px; font-size:.8rem; width:100%; }
    .pipeline-form input:focus, .pipeline-form select:focus { outline:none; border-color:var(--accent); }
    textarea { height:160px; font-family:monospace; font-size:.75rem; resize:vertical; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:5px; padding:8px 10px; width:100%; }
    textarea:focus { outline:none; border-color:var(--accent); }

    /* ── Face grid ───────────────────────────────────────────────────────── */
    .face-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; }
    .face-btn { padding:7px; background:var(--bg); border:1px solid var(--border); border-radius:5px; color:var(--text); cursor:pointer; font-size:.76rem; text-align:center; }
    .face-btn:hover { border-color:var(--accent); color:var(--accent); }
    .speech-row { display:flex; gap:8px; }
    .speech-row input { flex:1; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:5px; padding:7px 10px; font-size:.8rem; }

    /* ── Toggle ──────────────────────────────────────────────────────────── */
    .toggle { position:relative; display:inline-block; width:34px; height:18px; }
    .toggle input { opacity:0; width:0; height:0; }
    .slider { position:absolute; inset:0; background:var(--border); border-radius:18px; cursor:pointer; transition:.2s; }
    .slider:before { content:''; position:absolute; height:12px; width:12px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
    input:checked + .slider { background:var(--accent); }
    input:checked + .slider:before { transform:translateX(16px); }

    .live-val { font-family:monospace; font-size:.72rem; background:var(--surface2); border:1px solid var(--border); border-radius:3px; padding:1px 5px; color:var(--green); }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    #toast { position:fixed; bottom:18px; right:18px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:8px 14px; font-size:.8rem; opacity:0; transition:opacity .2s; pointer-events:none; z-index:100; }
    #toast.show { opacity:1; }
    /* ── Service tag ──── */
    .svc-tag { display:inline-flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border); border-radius:999px; padding:4px 12px; margin-bottom:6px; cursor:pointer; font-size:.8rem; transition:border-color .15s; }
    .svc-tag:hover, .svc-tag.active { border-color:var(--accent); color:var(--accent); }
    .svc-tag .stag-del { color:var(--muted); margin-left:4px; font-size:.75rem; cursor:pointer; }
    .svc-tag .stag-del:hover { color:var(--red); }

    /* ── Service detail overlay (replaces middle panel content) ──── */
    #svc-detail { display:none; }
    #svc-detail.open { display:flex; flex-direction:column; }

    /* ── IO row ────── */
    .io-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .io-row input, .io-row select { flex:1; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:5px; padding:5px 8px; font-size:.78rem; }

    /* ── Rule row ────── */
    .rule-row { background:var(--surface2); border-radius:var(--radius); padding:8px 10px; margin-bottom:6px; font-size:.78rem; display:flex; align-items:center; gap:8px; }
    .rule-row .rule-desc { flex:1; color:var(--text); }
    .rule-row .rule-del { color:var(--muted); cursor:pointer; font-size:.72rem; }
    .rule-row .rule-del:hover { color:var(--red); }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.3rem">⚡</span>
  <h1>Electro</h1>
  <div class="hdr-right">
    <button class="btn btn-ghost btn-sm" onclick="loadAll()">Refresh</button>
  </div>
</header>

<main>
  <!-- Col 1: Projects -->
  <div class="col" id="col-projects">
    <div class="col-hdr">
      <span>Projects</span>
      <button class="btn btn-primary btn-sm" onclick="showNewProjectForm()">+</button>
    </div>
    <div class="col-body" id="project-list">Loading…</div>
  </div>

  <!-- Col 2: Devices + Services -->
  <div class="col" id="col-middle">
    <div class="col-hdr">
      <span id="middle-title">Select a project</span>
      <button id="svc-back-btn" class="btn btn-ghost btn-sm" style="display:none" onclick="closeServiceDetail()">← Back</button>
    </div>
    <!-- Project contents -->
    <div class="col-body" id="middle-body">
      <p style="color:var(--muted);font-size:.82rem;margin-top:8px">Select a project to see its devices and services.</p>
    </div>
    <!-- Service detail (shown when a service is selected) -->
    <div class="col-body" id="svc-detail"></div>
  </div>

  <!-- Col 3: Device detail -->
  <div id="detail" class="empty">
    <p class="empty-msg">Select a device</p>
  </div>
</main>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let projects    = [];
let allDevices  = [];
let selectedProj  = null;
let selected      = null; // deviceId
let devicePins    = [];

// ── Helpers ────────────────────────────────────────────────────────────────
function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = ok ? 'var(--green)' : 'var(--red)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
}
function isOnline(lastSeen) { return Date.now() - new Date(lastSeen).getTime() < 90000; }
function ago(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}
function dirBadge(dir) {
  const map = { input:'input', output:'output', i2c:'i2c', power:'power' };
  return `<span class="badge ${map[dir]||''}">${dir.toUpperCase()}</span>`;
}

// ── Load ───────────────────────────────────────────────────────────────────
async function loadAll() {
  [projects, allDevices] = await Promise.all([
    api('GET', '/projects'),
    api('GET', '/robot'),
  ]);
  renderProjectList();
  if (selectedProj && selectedProj !== '__unassigned') {
    const proj = await api('GET', `/projects/${selectedProj}`);
    renderMiddle(proj);
  } else if (selectedProj === '__unassigned') {
    selectUnassigned();
  }
}

// ── Col 1: Project list ────────────────────────────────────────────────────
function renderProjectList() {
  const el = document.getElementById('project-list');
  const unassigned = allDevices.filter(d => !d.projectId);

  let html = projects.map(p => `
    <div class="proj-card ${selectedProj===p.id?'active':''}" onclick="selectProject('${p.id}')">
      <div class="pname">${p.name}</div>
      <div class="pmeta">
        <span>📱 ${p.deviceCount}</span>
        <span>🧠 ${p.serviceCount}</span>
      </div>
    </div>`).join('');

  // Unassigned group
  if (unassigned.length) {
    const uActive = selectedProj === '__unassigned' ? 'active' : '';
    html += `<div class="unassigned-hdr">Unassigned (${unassigned.length})</div>`;
    html += unassigned.map(d => `
      <div class="proj-card ${uActive}" onclick="selectUnassigned()">
        <div class="pname" style="font-size:.8rem">${d.deviceName}</div>
        <div class="pmeta"><span class="badge ${isOnline(d.lastSeen)?'online':'offline'}">●</span></div>
      </div>`).join('');
  }

  el.innerHTML = html || '<p style="color:var(--muted);font-size:.8rem">No projects yet.</p>';
}

function showNewProjectForm() {
  const el = document.getElementById('project-list');
  const existing = document.getElementById('new-proj-form');
  if (existing) { existing.remove(); return; }
  const form = document.createElement('div');
  form.id = 'new-proj-form';
  form.className = 'inline-form';
  form.innerHTML = `
    <div><label>Name</label><input id="np-name" placeholder="e.g. Tara Home" /></div>
    <div><label>Description</label><input id="np-desc" placeholder="Optional" /></div>
    <div class="row">
      <button class="btn btn-primary btn-sm" onclick="createProject()">Create</button>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('new-proj-form').remove()">Cancel</button>
    </div>`;
  el.prepend(form);
  document.getElementById('np-name').focus();
}

async function createProject() {
  const name = document.getElementById('np-name').value.trim();
  const desc = document.getElementById('np-desc').value.trim();
  if (!name) { toast('Name required', false); return; }
  try {
    await api('POST', '/projects', { name, description: desc });
    toast('Project created');
    document.getElementById('new-proj-form')?.remove();
    loadAll();
  } catch(e) { toast(`Error: ${e.message}`, false); }
}

// ── Col 2: Middle panel ────────────────────────────────────────────────────
async function selectProject(id) {
  selectedProj = id;
  renderProjectList();
  const proj = await api('GET', `/projects/${id}`);
  renderMiddle(proj);
}

function selectUnassigned() {
  selectedProj = '__unassigned';
  renderProjectList();
  const unassigned = allDevices.filter(d => !d.projectId);
  document.getElementById('middle-title').textContent = 'Unassigned Devices';
  const body = document.getElementById('middle-body');
  body.innerHTML = unassigned.map(d => deviceCard(d, false)).join('') ||
    '<p style="color:var(--muted);font-size:.82rem">No unassigned devices.</p>';
}

function renderMiddle(proj) {
  document.getElementById('middle-title').textContent = proj.name;
  const body = document.getElementById('middle-body');

  const devicesHtml = proj.devices && proj.devices.length
    ? proj.devices.map(d => deviceCard(d, true, proj.id)).join('')
    : '<p style="color:var(--muted);font-size:.78rem;margin-bottom:8px">No devices in this project.</p>';

  const servicesHtml = (proj.services || []).map(s => serviceCard(s, proj.id)).join('');

  body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div class="section-title" style="margin:0">Devices</div>
      <button class="btn btn-ghost btn-sm" onclick="showAssignDevice('${proj.id}')">+ Assign</button>
    </div>
    <div id="devices-list-${proj.id}">${devicesHtml}</div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin:12px 0 6px">
      <div class="section-title" style="margin:0">Services / Brain</div>
      <button class="btn btn-ghost btn-sm" onclick="showAddService('${proj.id}')">+ Add</button>
    </div>
    <div id="services-list-${proj.id}">${servicesHtml}</div>
    <div id="svc-form-${proj.id}"></div>
    <div id="assign-form-${proj.id}"></div>
  `;
}

function deviceCard(d, showUnassign, projId) {
  const online = isOnline(d.lastSeen);
  return `
    <div class="dev-card ${selected===d.deviceId?'active':''}" onclick="selectDevice('${d.deviceId}')">
      <div class="dname">${d.deviceName}</div>
      <div class="did">${d.deviceId}</div>
      <div class="dmeta">
        <span class="badge ${online?'online':'offline'}">${online?'ONLINE':'OFFLINE'}</span>
        <span class="badge type">${d.deviceType}</span>
        <span style="font-size:.68rem;color:var(--muted)">v${d.firmwareVersion}</span>
        ${showUnassign ? `<button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="event.stopPropagation();unassignDevice('${projId}','${d.deviceId}')">✕</button>` : ''}
      </div>
    </div>`;
}

function serviceCard(s, projId) {
  const desc = s.description ? `<span style="font-size:.7rem;color:var(--muted);margin-left:4px">${s.description}</span>` : '';
  return `<span class="svc-tag" onclick="openServiceDetail('${projId}','${s.id}','${s.name}')">
    🧠 ${s.name}${desc}
    <span class="stag-del" onclick="event.stopPropagation();deleteService('${projId}','${s.id}')">✕</span>
  </span>`;
}

function showAddService(projId) {
  const el = document.getElementById(`svc-form-${projId}`);
  el.innerHTML = `
    <div class="inline-form">
      <div><label>Name</label><input id="sn-name" placeholder="e.g. Tara Brain" /></div>
      <div><label>Description</label><input id="sn-desc" placeholder="Optional" /></div>
      <div class="row">
        <button class="btn btn-primary btn-sm" onclick="createService('${projId}')">Add</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('svc-form-${projId}').innerHTML=''">Cancel</button>
      </div>
    </div>`;
  document.getElementById('sn-name').focus();
}

async function createService(projId) {
  const name = document.getElementById('sn-name').value.trim();
  const desc = document.getElementById('sn-desc').value.trim();
  if (!name) { toast('Name required', false); return; }
  try {
    await api('POST', `/projects/${projId}/services`, { name, description: desc });
    toast('Service added');
    const proj = await api('GET', `/projects/${projId}`);
    renderMiddle(proj);
    loadAll();
  } catch(e) { toast(`Error: ${e.message}`, false); }
}

// ── Service detail panel ───────────────────────────────────────────────────
// Opens in the middle column replacing the project contents.
// State stored per-service as JSON in localStorage key svc_{id}

let _activeSvcId   = null;
let _activeProjId  = null;
let _activeSvcName = null;

function openServiceDetail(projId, svcId, svcName) {
  _activeSvcId   = svcId;
  _activeProjId  = projId;
  _activeSvcName = svcName;

  document.getElementById('middle-body').style.display  = 'none';
  document.getElementById('svc-detail').classList.add('open');
  document.getElementById('svc-back-btn').style.display = '';
  document.getElementById('middle-title').textContent   = svcName;

  const saved = JSON.parse(localStorage.getItem(`svc_${svcId}`) || '{"inputs":[],"outputs":[],"rules":[]}');
  renderServiceDetail(svcId, saved);
}

function closeServiceDetail() {
  _activeSvcId = null;
  document.getElementById('middle-body').style.display  = '';
  document.getElementById('svc-detail').classList.remove('open');
  document.getElementById('svc-back-btn').style.display = 'none';
  const proj = projects.find(p => p.id === _activeProjId);
  if (proj) document.getElementById('middle-title').textContent = proj?.name ?? '';
}

function saveServiceState(svcId, state) {
  localStorage.setItem(`svc_${svcId}`, JSON.stringify(state));
}

function loadServiceState(svcId) {
  return JSON.parse(localStorage.getItem(`svc_${svcId}`) || '{"inputs":[],"outputs":[],"rules":[]}');
}

function renderServiceDetail(svcId, state) {
  const el = document.getElementById('svc-detail');
  el.innerHTML = `
    <div style="padding:10px;display:flex;flex-direction:column;gap:12px">

      <!-- Inputs -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span class="section-title" style="margin:0">Inputs</span>
          <button class="btn btn-ghost btn-sm" onclick="addIO('${svcId}','input')">+ Add</button>
        </div>
        <div id="svc-inputs-${svcId}">
          ${state.inputs.map((inp, i) => ioRow(svcId, 'input', inp, i)).join('') ||
            '<p style="color:var(--muted);font-size:.75rem">No inputs yet.</p>'}
        </div>
      </div>

      <!-- Outputs -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span class="section-title" style="margin:0">Outputs</span>
          <button class="btn btn-ghost btn-sm" onclick="addIO('${svcId}','output')">+ Add</button>
        </div>
        <div id="svc-outputs-${svcId}">
          ${state.outputs.map((out, i) => ioRow(svcId, 'output', out, i)).join('') ||
            '<p style="color:var(--muted);font-size:.75rem">No outputs yet.</p>'}
        </div>
      </div>

      <!-- Rules -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span class="section-title" style="margin:0">Rules</span>
          <button class="btn btn-ghost btn-sm" onclick="addRule('${svcId}')">+ Add</button>
        </div>
        <div id="svc-rules-${svcId}">
          ${state.rules.map((r, i) => ruleRow(svcId, r, i)).join('') ||
            '<p style="color:var(--muted);font-size:.75rem">No rules yet.</p>'}
        </div>
      </div>

      <div id="svc-add-form-${svcId}"></div>
    </div>`;
}

function ioRow(svcId, kind, item, idx) {
  const badge = kind === 'input'
    ? '<span class="badge input" style="font-size:.6rem">IN</span>'
    : '<span class="badge output" style="font-size:.6rem">OUT</span>';
  return `<div class="rule-row">
    ${badge}
    <span class="rule-desc"><strong>${item.name}</strong><span style="color:var(--muted);margin-left:6px;font-size:.72rem">${item.type||''}</span></span>
    ${item.description ? `<span style="color:var(--muted);font-size:.72rem">${item.description}</span>` : ''}
    <span class="rule-del" onclick="removeIO('${svcId}','${kind}',${idx})">✕</span>
  </div>`;
}

function ruleRow(svcId, rule, idx) {
  return `<div class="rule-row">
    <span style="font-size:.9rem">⚙</span>
    <span class="rule-desc">${rule.description || rule.when + ' → ' + rule.then}</span>
    <span class="rule-del" onclick="removeRule('${svcId}',${idx})">✕</span>
  </div>`;
}

function addIO(svcId, kind) {
  const el = document.getElementById(`svc-add-form-${svcId}`);
  el.innerHTML = `
    <div class="inline-form">
      <div><label>${kind === 'input' ? 'Input' : 'Output'} Name</label><input id="io-name" placeholder="e.g. temperature, relay_1" /></div>
      <div class="row">
        <div><label>Type</label>
          <select id="io-type">
            <option value="number">Number</option>
            <option value="boolean">Boolean</option>
            <option value="string">String</option>
            <option value="json">JSON</option>
          </select>
        </div>
        <div><label>Description</label><input id="io-desc" placeholder="Optional" /></div>
      </div>
      <div class="row">
        <button class="btn btn-primary btn-sm" onclick="saveIO('${svcId}','${kind}')">Add</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('svc-add-form-${svcId}').innerHTML=''">Cancel</button>
      </div>
    </div>`;
  document.getElementById('io-name').focus();
}

function saveIO(svcId, kind) {
  const name = document.getElementById('io-name').value.trim();
  const type = document.getElementById('io-type').value;
  const desc = document.getElementById('io-desc').value.trim();
  if (!name) { toast('Name required', false); return; }
  const state = loadServiceState(svcId);
  state[kind === 'input' ? 'inputs' : 'outputs'].push({ name, type, description: desc });
  saveServiceState(svcId, state);
  renderServiceDetail(svcId, state);
}

function removeIO(svcId, kind, idx) {
  const state = loadServiceState(svcId);
  state[kind === 'input' ? 'inputs' : 'outputs'].splice(idx, 1);
  saveServiceState(svcId, state);
  renderServiceDetail(svcId, state);
}

function addRule(svcId) {
  const el = document.getElementById(`svc-add-form-${svcId}`);
  el.innerHTML = `
    <div class="inline-form">
      <div><label>When (condition)</label><input id="rule-when" placeholder='e.g. temperature > 30' /></div>
      <div><label>Then (action)</label><input id="rule-then" placeholder='e.g. turn on relay_1' /></div>
      <div><label>Description</label><input id="rule-desc-in" placeholder="Optional label" /></div>
      <div class="row">
        <button class="btn btn-primary btn-sm" onclick="saveRule('${svcId}')">Add</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('svc-add-form-${svcId}').innerHTML=''">Cancel</button>
      </div>
    </div>`;
  document.getElementById('rule-when').focus();
}

function saveRule(svcId) {
  const when = document.getElementById('rule-when').value.trim();
  const then = document.getElementById('rule-then').value.trim();
  const desc = document.getElementById('rule-desc-in').value.trim();
  if (!when || !then) { toast('When and Then required', false); return; }
  const state = loadServiceState(svcId);
  state.rules.push({ when, then, description: desc });
  saveServiceState(svcId, state);
  renderServiceDetail(svcId, state);
}

function removeRule(svcId, idx) {
  const state = loadServiceState(svcId);
  state.rules.splice(idx, 1);
  saveServiceState(svcId, state);
  renderServiceDetail(svcId, state);
}
  } catch(e) { toast(`Error: ${e.message}`, false); }
}

async function deleteService(projId, sid) {
  if (!confirm('Delete this service?')) return;
  try {
    await api('DELETE', `/projects/${projId}/services/${sid}`);
    toast('Service deleted');
    const proj = await api('GET', `/projects/${projId}`);
    renderMiddle(proj);
    loadAll();
  } catch(e) { toast(`Error: ${e.message}`, false); }
}

function showAssignDevice(projId) {
  const el = document.getElementById(`assign-form-${projId}`);
  const unassigned = allDevices.filter(d => !d.projectId);
  if (!unassigned.length) { toast('No unassigned devices available'); return; }
  el.innerHTML = `
    <div class="inline-form">
      <div>
        <label>Device</label>
        <select id="ad-device">
          ${unassigned.map(d => `<option value="${d.deviceId}">${d.deviceName} (${d.deviceType})</option>`).join('')}
        </select>
      </div>
      <div class="row">
        <button class="btn btn-primary btn-sm" onclick="assignDevice('${projId}')">Assign</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('assign-form-${projId}').innerHTML=''">Cancel</button>
      </div>
    </div>`;
}

async function assignDevice(projId) {
  const deviceId = document.getElementById('ad-device').value;
  try {
    await api('POST', `/projects/${projId}/devices/${deviceId}`);
    toast('Device assigned');
    const proj = await api('GET', `/projects/${projId}`);
    renderMiddle(proj);
    loadAll();
  } catch(e) { toast(`Error: ${e.message}`, false); }
}

async function unassignDevice(projId, deviceId) {
  if (!confirm('Remove device from project?')) return;
  try {
    await api('DELETE', `/projects/${projId}/devices/${deviceId}`);
    toast('Device unassigned');
    const proj = await api('GET', `/projects/${projId}`);
    renderMiddle(proj);
    loadAll();
  } catch(e) { toast(`Error: ${e.message}`, false); }
}

// ── Col 3: Device detail ───────────────────────────────────────────────────
async function selectDevice(id) {
  selected = id;
  // Re-render middle to update active state
  if (selectedProj && selectedProj !== '__unassigned') {
    const proj = await api('GET', `/projects/${selectedProj}`);
    renderMiddle(proj);
  }

  const detail = document.getElementById('detail');
  detail.className = '';
  detail.innerHTML = `
    <div class="tabs" id="tabs">
      <div class="tab active" onclick="switchTab('health')">Health</div>
      <div class="tab" onclick="switchTab('config')">Config</div>
      <div class="tab" onclick="switchTab('hardware')">Hardware</div>
    </div>
    <div id="tab-health"   class="tab-content active"></div>
    <div id="tab-config"   class="tab-content"></div>
    <div id="tab-hardware" class="tab-content"></div>
  `;

  const [d, pins] = await Promise.all([
    api('GET', `/robot/${id}`),
    api('GET', `/robot/${id}/pins`),
  ]);
  devicePins = pins;

  renderHealth(d);
  renderConfig(id, d);
  renderHardware(id, pins);
}

function switchTab(name) {
  const names = ['health','config','hardware'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i]===name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// ── Tab: Health ────────────────────────────────────────────────────────────
function sensorRow(label, val, unit) { return val == null ? '' : `<tr><th>${label}</th><td>${val} ${unit}</td></tr>`; }
function buildSensorCard(r) {
  return `<div class="card"><h3>Latest Reading — ${ago(r.recordedAt)}</h3><table>
    ${sensorRow('Temperature',r.temperature,'°C')}
    ${sensorRow('Humidity',r.humidity,'%')}
    ${sensorRow('Light',r.light,'%')}
  </table></div>`;
}
function renderHealth(d) {
  const online = isOnline(d.lastSeen);
  const r = (d.readings||[])[0];
  document.getElementById('tab-health').innerHTML = `
    <div class="card"><h3>Status</h3>
      <div class="health-grid">
        <div class="stat"><div class="val" style="color:${online?'var(--green)':'var(--red)'}">${online?'ONLINE':'OFFLINE'}</div><div class="lbl">Status</div></div>
        <div class="stat"><div class="val">${d.firmwareVersion}</div><div class="lbl">Firmware</div></div>
        <div class="stat"><div class="val" style="font-size:1rem">${ago(d.lastSeen)}</div><div class="lbl">Last Seen</div></div>
      </div>
    </div>
    <div class="card"><h3>Device Info</h3><table>
      <tr><th>Device ID</th><td><code>${d.deviceId}</code></td></tr>
      <tr><th>Type</th><td><span class="badge type">${d.deviceType}</span></td></tr>
      <tr><th>Registered</th><td>${new Date(d.createdAt).toLocaleString()}</td></tr>
    </table></div>
    ${r ? buildSensorCard(r) : ''}`;
}

// ── Tab: Config ────────────────────────────────────────────────────────────
function renderConfig(deviceId, device) {

  document.getElementById('tab-config').innerHTML = `
    <div class="card">
      <h3>Device Identity</h3>
      <div class="pipeline-form" style="background:var(--bg);border:none;padding:0;gap:12px">
        <div class="row">
          <div>
            <label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:3px">Device Name</label>
            <input id="cfg-name" value="${device.deviceName}" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:.82rem;width:100%" />
          </div>
          <div>
            <label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:3px">Device Type</label>
            <input id="cfg-type" value="${device.deviceType}" placeholder="e.g. robot, clock, sensor-hub"
              style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:.82rem;width:100%" />
          </div>
        </div>
        <p style="font-size:.72rem;color:var(--muted)">
          Device type is used for OTA targeting from Pocket — all devices of the same type receive firmware updates together.
        </p>
        <button class="btn btn-primary btn-sm" style="align-self:flex-start" onclick="saveDeviceIdentity('${deviceId}')">Save</button>
      </div>
    </div>

    <div class="card" id="ota-check-card-${deviceId}">
      <h3 style="display:flex;align-items:center;justify-content:space-between">
        OTA Firmware
        <button class="btn btn-ghost btn-sm" onclick="checkOTA('${deviceId}','${device.deviceType}')">Check for Updates</button>
      </h3>
      <div id="ota-status-${deviceId}">
        <p style="font-size:.82rem;color:var(--muted)">
          Current: <strong>v${device.firmwareVersion}</strong> &nbsp;·&nbsp;
          Click "Check for Updates" to compare with Pocket.
        </p>
      </div>
    </div>
  `;
}

async function saveDeviceIdentity(deviceId) {
  const name = document.getElementById('cfg-name').value.trim();
  const type = document.getElementById('cfg-type').value.trim();
  if (!name || !type) { toast('Name and type required', false); return; }
  try {
    await api('POST', '/device/register', {
      deviceId, deviceName: name, deviceType: type, firmwareVersion: '—',
    });
    toast('Identity updated');
    // Refresh device detail to reflect new type
    selectDevice(deviceId);
  } catch(e) { toast(`Error: ${e.message}`, false); }
}

async function pushDeviceConfig(deviceId) {
  let cfg;
  try { cfg = JSON.parse(document.getElementById('dev-config-editor').value); }
  catch { toast('Invalid JSON', false); return; }
  try {
    const r = await api('PUT', `/robot/${deviceId}/config`, cfg);
    toast(`Config v${r.version} pushed to device`);
  } catch(e) { toast(`Error: ${e.message}`, false); }
}
function fmtDeviceConfig() {
  const el = document.getElementById('dev-config-editor');
  try { el.value = JSON.stringify(JSON.parse(el.value), null, 2); }
  catch { toast('Invalid JSON', false); }
}

async function checkOTA(deviceId, deviceType) {
  const el = document.getElementById(`ota-status-${deviceId}`);
  el.innerHTML = '<p style="color:var(--muted);font-size:.82rem">Checking Pocket…</p>';
  try {
    // Ask our server to check Pocket for the latest artifact for this device type
    const result = await api('GET', `/robot/${deviceId}/ota-check`);
    if (result.available) {
      el.innerHTML = `
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <div>
            <span style="color:var(--yellow);font-weight:600;font-size:.85rem">Update available</span>
            <span style="font-size:.78rem;color:var(--muted);margin-left:8px">v${result.currentVersion} → v${result.latestVersion}</span>
            ${result.releaseNotes ? `<p style="font-size:.75rem;color:var(--muted);margin-top:3px">${result.releaseNotes}</p>` : ''}
          </div>
          <button class="btn btn-green btn-sm" onclick="pushOTAFromElectro('${deviceId}','${result.otaReleaseId}')">
            ⚡ Update Now
          </button>
        </div>`;
    } else {
      el.innerHTML = `<p style="color:var(--green);font-size:.82rem">✓ Up to date (v${result.currentVersion})</p>`;
    }
  } catch(e) {
    el.innerHTML = `<p style="color:var(--red);font-size:.82rem">Could not reach Pocket: ${e.message}</p>`;
  }
}

async function pushOTAFromElectro(deviceId, otaReleaseId) {
  try {
    await api('POST', `/robot/${deviceId}/push-ota`, { otaReleaseId });
    toast('OTA update sent to device — it will reboot shortly');
    selectDevice(deviceId);
  } catch(e) { toast(`Error: ${e.message}`, false); }
}

// ── Tab: Hardware ──────────────────────────────────────────────────────────
function renderHardware(deviceId, pins) {
  document.getElementById('tab-hardware').innerHTML = `
    <div class="card">
      <h3 style="display:flex;align-items:center;justify-content:space-between">
        Pin Registry
        <button class="btn btn-primary btn-sm" onclick="showAddPin('${deviceId}')">+ Add Pin</button>
      </h3>
      <table>
        <thead><tr><th>GPIO</th><th>Label</th><th>Direction</th><th>Component</th><th>Protocol</th><th>Live</th><th>Notes</th><th></th></tr></thead>
        <tbody id="pin-table">
          ${pins.map(p => `<tr>
            <td><code>${p.pin}</code></td><td><strong>${p.label}</strong></td>
            <td>${dirBadge(p.direction)}</td><td>${p.component}</td>
            <td style="color:var(--muted);font-size:.72rem">${p.protocol||'—'}</td>
            <td><span class="live-val" id="live-${deviceId}-${p.label}">—</span></td>
            <td style="color:var(--muted);font-size:.72rem">${p.notes||'—'}</td>
            <td><button class="btn btn-danger btn-sm" onclick="deletePin('${deviceId}','${p.pin}')">✕</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div id="add-pin-form"></div>`;
}
function showAddPin(deviceId) {
  document.getElementById('add-pin-form').innerHTML = `
    <div class="pipeline-form">
      <h3>Add / Update Pin</h3>
      <div class="row">
        <div><label>GPIO / Pin</label><input id="np-pin" placeholder="e.g. 4, 3V3, GND" /></div>
        <div><label>Label</label><input id="np-label" placeholder="e.g. DHT11_DATA" /></div>
      </div>
      <div class="row">
        <div><label>Direction</label><select id="np-dir"><option value="input">Input</option><option value="output">Output</option><option value="i2c">I2C</option><option value="power">Power</option></select></div>
        <div><label>Protocol</label><select id="np-proto"><option value="">—</option><option>DIGITAL</option><option>ANALOG</option><option>I2C</option><option>PWM</option><option>UART</option><option>SPI</option></select></div>
      </div>
      <div><label>Component</label><input id="np-component" placeholder="e.g. DHT11, Relay, LED" /></div>
      <div><label>Notes</label><input id="np-notes" placeholder="Optional" /></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="savePin('${deviceId}')">Save</button>
        <button class="btn btn-ghost" onclick="document.getElementById('add-pin-form').innerHTML=''">Cancel</button>
      </div>
    </div>`;
}
async function savePin(deviceId) {
  const pin=document.getElementById('np-pin').value.trim(), label=document.getElementById('np-label').value.trim();
  const direction=document.getElementById('np-dir').value, protocol=document.getElementById('np-proto').value||null;
  const component=document.getElementById('np-component').value.trim(), notes=document.getElementById('np-notes').value.trim()||null;
  if (!pin||!label||!component){toast('Pin, label and component required',false);return;}
  try {
    await api('POST',`/robot/${deviceId}/pins`,{pin,label,direction,component,protocol,notes});
    toast('Pin saved'); devicePins=await api('GET',`/robot/${deviceId}/pins`);
    renderHardware(deviceId,devicePins);
  } catch(e){toast(`Error: ${e.message}`,false);}
}
async function deletePin(deviceId,pin) {
  if (!confirm(`Delete pin ${pin}?`)) return;
  try {
    await api('DELETE',`/robot/${deviceId}/pins/${encodeURIComponent(pin)}`);
    toast('Pin removed'); devicePins=await api('GET',`/robot/${deviceId}/pins`);
    renderHardware(deviceId,devicePins);
  } catch(e){toast(`Error: ${e.message}`,false);}
}

// ── Live pin polling ───────────────────────────────────────────────────────
async function pollPinState() {
  if (!selected) return;
  try {
    const state=await api('GET',`/robot/${selected}/pin_state`);
    Object.entries(state).forEach(([label,val])=>{
      const el=document.getElementById(`live-${selected}-${label}`);
      if (el) el.textContent=String(val);
    });
  } catch { /* offline */ }
}

// ── Init ───────────────────────────────────────────────────────────────────
loadAll();
setInterval(loadAll, 30000);
setInterval(pollPinState, 3000);
</script>
</body>
</html>
