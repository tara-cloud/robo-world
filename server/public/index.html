<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electro</title>
  <style>
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --surface2:#1f2235;
      --border:  #2a2d3a;
      --accent:  #6c63ff;
      --green:   #22c55e;
      --yellow:  #eab308;
      --red:     #ef4444;
      --blue:    #3b82f6;
      --orange:  #f97316;
      --purple:  #a855f7;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --radius:  8px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow:hidden; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header { display:flex; align-items:center; gap:10px; padding:12px 18px; border-bottom:1px solid var(--border); height:50px; }
    header h1 { font-size:1rem; font-weight:700; letter-spacing:.04em; color:var(--accent); }
    .hdr-right { margin-left:auto; display:flex; gap:8px; }

    /* ── 3-column layout ─────────────────────────────────────────────────── */
    main { display:grid; grid-template-columns:180px 250px 1fr; height:calc(100vh - 50px); overflow:hidden; position:relative; }

    /* ── Shared column styles ─────────────────────────────────────────────── */
    .col { border-right:1px solid var(--border); overflow-y:auto; display:flex; flex-direction:column; }
    .col-hdr { display:flex; align-items:center; justify-content:space-between; padding:10px 12px 6px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .col-hdr span { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
    .col-body { padding:10px; flex:1; overflow-y:auto; }

    /* ── Project cards ───────────────────────────────────────────────────── */
    .proj-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:9px 11px; margin-bottom:7px; cursor:pointer; transition:border-color .15s; }
    .proj-card:hover, .proj-card.active { border-color:var(--accent); }
    .proj-card .pname { font-weight:600; font-size:.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .proj-card .pmeta { display:flex; gap:8px; margin-top:4px; font-size:.7rem; color:var(--muted); }

    /* Unassigned group */
    .unassigned-hdr { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin:12px 0 6px; padding:0 2px; }

    /* ── Middle panel: devices + services ───────────────────────────────── */
    .section-title { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin:10px 0 6px; }
    .dev-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:9px 11px; margin-bottom:7px; cursor:pointer; transition:border-color .15s; }
    .dev-card:hover, .dev-card.active { border-color:var(--accent); }
    .dev-card .dname { font-weight:600; font-size:.85rem; }
    .dev-card .did   { font-size:.68rem; color:var(--muted); font-family:monospace; margin-top:1px; }
    .dev-card .dmeta { display:flex; gap:6px; margin-top:5px; align-items:center; flex-wrap:wrap; }

    .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .status-dot.online  { background:var(--green); }
    .status-dot.offline { background:var(--red); }
    .status-dot.unknown { background:var(--muted); }

    /* Inline form */
    .inline-form { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:10px; margin-bottom:8px; display:flex; flex-direction:column; gap:7px; }
    .inline-form input, .inline-form select { background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:5px; padding:5px 8px; font-size:.78rem; width:100%; }
    .inline-form input:focus { outline:none; border-color:var(--accent); }
    .inline-form .row { display:flex; gap:6px; }
    .inline-form label { font-size:.7rem; color:var(--muted); display:block; margin-bottom:2px; }

    /* ── Right panel ─────────────────────────────────────────────────────── */
    #detail { overflow-y:auto; display:flex; flex-direction:column; }
    #detail.empty { align-items:center; justify-content:center; }
    .empty-msg { color:var(--muted); font-size:.9rem; }

    /* ── Tabs ────────────────────────────────────────────────────────────── */
    .tabs { display:flex; border-bottom:1px solid var(--border); padding:0 18px; background:var(--surface); position:sticky; top:0; z-index:10; }
    .tab  { padding:11px 14px; font-size:.78rem; cursor:pointer; border-bottom:2px solid transparent; color:var(--muted); white-space:nowrap; }
    .tab:hover  { color:var(--text); }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-content { display:none; padding:18px; flex-direction:column; gap:14px; }
    .tab-content.active { display:flex; }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
    .card h3 { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:12px; }
    .health-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .stat .val { font-size:1.3rem; font-weight:700; }
    .stat .lbl { font-size:.68rem; color:var(--muted); margin-top:2px; }

    /* ── Badges ──────────────────────────────────────────────────────────── */
    .badge { font-size:.65rem; padding:2px 7px; border-radius:999px; font-weight:600; }
    .badge.online  { background:#166534; color:#bbf7d0; }
    .badge.offline { background:#7f1d1d; color:#fecaca; }
    .badge.input   { background:#1e3a5f; color:#93c5fd; }
    .badge.output  { background:#431407; color:#fdba74; }
    .badge.i2c     { background:#3b0764; color:#d8b4fe; }
    .badge.power   { background:#422006; color:#fde68a; }
    .badge.type    { background:var(--surface2); color:var(--muted); }

    /* ── Tables ──────────────────────────────────────────────────────────── */
    table { width:100%; border-collapse:collapse; font-size:.8rem; }
    th,td { padding:7px 10px; border-bottom:1px solid var(--border); text-align:left; vertical-align:middle; }
    th { color:var(--muted); font-weight:500; font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; }
    tr:last-child td { border-bottom:none; }
    code { font-family:monospace; font-size:.75rem; background:var(--bg); padding:1px 5px; border-radius:3px; }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn { padding:7px 13px; border:none; border-radius:var(--radius); cursor:pointer; font-size:.8rem; font-weight:600; transition:opacity .15s; }
    .btn:hover { opacity:.85; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-ghost   { background:transparent; border:1px solid var(--border); color:var(--text); }
    .btn-danger  { background:transparent; border:1px solid var(--red); color:var(--red); }
    .btn-green   { background:var(--green); color:#000; }
    .btn-sm      { padding:3px 9px; font-size:.72rem; }

    /* ── Pipeline / Hardware forms ───────────────────────────────────────── */
    .pipeline-form { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:14px; display:flex; flex-direction:column; gap:9px; margin-bottom:12px; }
    .pipeline-form .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .pipeline-form label { font-size:.72rem; color:var(--muted); display:block; margin-bottom:3px; }
    .pipeline-form input, .pipeline-form select, .pipeline-form textarea { background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:5px; padding:6px 10px; font-size:.8rem; width:100%; }
    .pipeline-form input:focus, .pipeline-form select:focus { outline:none; border-color:var(--accent); }
    textarea { height:160px; font-family:monospace; font-size:.75rem; resize:vertical; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:5px; padding:8px 10px; width:100%; }
    textarea:focus { outline:none; border-color:var(--accent); }

    /* ── Face grid ───────────────────────────────────────────────────────── */
    .face-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; }
    .face-btn { padding:7px; background:var(--bg); border:1px solid var(--border); border-radius:5px; color:var(--text); cursor:pointer; font-size:.76rem; text-align:center; }
    .face-btn:hover { border-color:var(--accent); color:var(--accent); }
    .speech-row { display:flex; gap:8px; }
    .speech-row input { flex:1; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:5px; padding:7px 10px; font-size:.8rem; }

    /* ── Toggle ──────────────────────────────────────────────────────────── */
    .toggle { position:relative; display:inline-block; width:34px; height:18px; }
    .toggle input { opacity:0; width:0; height:0; }
    .slider { position:absolute; inset:0; background:var(--border); border-radius:18px; cursor:pointer; transition:.2s; }
    .slider:before { content:''; position:absolute; height:12px; width:12px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
    input:checked + .slider { background:var(--accent); }
    input:checked + .slider:before { transform:translateX(16px); }

    .live-val { font-family:monospace; font-size:.72rem; background:var(--surface2); border:1px solid var(--border); border-radius:3px; padding:1px 5px; color:var(--green); }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    #toast { position:fixed; bottom:18px; right:18px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:8px 14px; font-size:.8rem; opacity:0; transition:opacity .2s; pointer-events:none; z-index:100; }
    #toast.show { opacity:1; }
    /* ── Modal popup ──── */
    #modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(6px); z-index:200; align-items:center; justify-content:center; }
    #modal-backdrop.open { display:flex; }
    dialog#modal-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; width:min(560px,92vw); max-height:85vh; display:flex; flex-direction:column; box-shadow:0 24px 64px rgba(0,0,0,.5); padding:0; margin:0; color:var(--text); }
    #modal-header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); flex-shrink:0; }
    #modal-header h2 { font-size:.95rem; font-weight:600; }
    #modal-close { background:none; border:none; color:var(--muted); font-size:1.2rem; cursor:pointer; padding:0 4px; line-height:1; }
    #modal-close:hover { color:var(--text); }
    #modal-body { overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px; }
    /* reuse inline-form inside modal without surface2 bg */
    #modal-body .inline-form { background:transparent; border:none; padding:0; }

    /* ── Service tag ──── */
    .svc-tag { display:inline-flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border); border-radius:999px; padding:4px 12px; margin-bottom:6px; cursor:pointer; font-size:.8rem; transition:border-color .15s; }
    .svc-tag:hover, .svc-tag.active { border-color:var(--accent); color:var(--accent); }
    .svc-tag .stag-del { color:var(--muted); margin-left:4px; font-size:.75rem; cursor:pointer; }
    .svc-tag .stag-del:hover { color:var(--red); }

    /* ── Component detail overlay ──── */
    #comp-detail { display:none; position:absolute; top:0; right:0; width:calc(100% - 180px - 250px); height:100%; background:var(--bg); z-index:20; overflow-y:auto; flex-direction:column; }
    #comp-detail.open { display:flex; }
    .comp-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:border-color .15s; }
    .comp-card:hover { border-color:var(--accent); }
    .comp-card .cname { font-weight:600; font-size:.9rem; }
    .comp-card .cmeta { display:flex; gap:8px; margin-top:5px; flex-wrap:wrap; align-items:center; }
    .comp-card .cdesc { font-size:.72rem; color:var(--muted); margin-top:3px; }

    /* ── IO row ────── */
    .io-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .io-row input, .io-row select { flex:1; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:5px; padding:5px 8px; font-size:.78rem; }

    /* ── Rule row ────── */
    .rule-row { background:var(--surface2); border-radius:var(--radius); padding:8px 10px; margin-bottom:6px; font-size:.78rem; display:flex; align-items:center; gap:8px; }
    .rule-row .rule-desc { flex:1; color:var(--text); }
    .rule-row .rule-del { color:var(--muted); cursor:pointer; font-size:.72rem; }
    .rule-row .rule-del:hover { color:var(--red); }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.3rem">⚡</span>
  <h1>Electro</h1>
  <div class="hdr-right">
    <button class="btn btn-ghost btn-sm" onclick="loadAll()">Refresh</button>
  </div>
</header>

<main>
  <!-- Col 1: Projects -->
  <div class="col" id="col-projects">
    <div class="col-hdr">
      <span>Projects</span>
      <button class="btn btn-primary btn-sm" onclick="showNewProjectForm()">+</button>
    </div>
    <div class="col-body" id="project-list">Loading…</div>
  </div>

  <!-- Col 2: Devices + Services -->
  <div class="col" id="col-middle">
    <div class="col-hdr">
      <span id="middle-title">Select a project</span>
      <button id="svc-back-btn" class="btn btn-ghost btn-sm" style="display:none" onclick="closeServiceDetail()">← Back</button>
    </div>
    <!-- Project contents -->
    <div class="col-body" id="middle-body">
      <p style="color:var(--muted);font-size:.82rem;margin-top:8px">Select a project to see its devices and services.</p>
    </div>
    <!-- Service detail (shown when a service is selected) -->
    <div class="col-body" id="svc-detail"></div>
  </div>

  <!-- Col 3: Device detail -->
  <div id="detail" class="empty">
    <p class="empty-msg">Select a device</p>
  </div>
  <!-- Component detail overlay — covers col 3 when a component is selected -->
  <div id="comp-detail"></div>
  </div>
</main>

<div id="modal-backdrop">
  <dialog id="modal-box">
    <div id="modal-header">
      <h2 id="modal-title">Form</h2>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </dialog>
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let projects    = [];
let allDevices  = [];
let selectedProj  = null;
let selected      = null; // deviceId
let devicePins    = [];

// ── Helpers ────────────────────────────────────────────────────────────────
function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = ok ? 'var(--green)' : 'var(--red)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
}
function isOnline(lastSeen) { return Date.now() - new Date(lastSeen).getTime() < 90000; }
function ago(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}
function dirBadge(dir) {
  const map = { input:'input', output:'output', i2c:'i2c', power:'power' };
  return `<span class="badge ${map[dir]||''}">${dir.toUpperCase()}</span>`;
}

// ── Modal helpers ─────────────────────────────────────────────────────────
function openModal(title, html, onConfirm) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-backdrop').classList.add('open');
  document.getElementById('modal-box').focus?.();
  if (onConfirm) globalThis._modalConfirm = onConfirm;
  // Focus first input
  setTimeout(() => {
    const first = document.querySelector('#modal-body input, #modal-body select, #modal-body textarea');
    first?.focus();
  }, 50);
}
function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.getElementById('modal-body').innerHTML = '';
  delete globalThis._modalConfirm;
}
function handleBackdropClick(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Load ───────────────────────────────────────────────────────────────────
async function loadAll() {
  [projects, allDevices] = await Promise.all([
    api('GET', '/projects'),
    api('GET', '/robot'),
  ]);
  renderProjectList();
  if (selectedProj && selectedProj !== '__unassigned') {
    const proj = await api('GET', `/projects/${selectedProj}`);
    renderMiddle(proj);
  } else if (selectedProj === '__unassigned') {
    selectUnassigned();
  }
}

// ── Col 1: Project list ────────────────────────────────────────────────────
function renderProjectList() {
  const el = document.getElementById('project-list');
  const unassigned = allDevices.filter(d => !d.projectId);

  let html = projects.map(p => `
    <div class="proj-card ${selectedProj===p.id?'active':''}" onclick="selectProject('${p.id}')">
      <div class="pname">${p.name}</div>
      <div class="pmeta">
        <span>📱 ${p.deviceCount}</span>
        <span>🧠 ${p.serviceCount}</span>
      </div>
    </div>`).join('');

  // Unassigned group
  if (unassigned.length) {
    const uActive = selectedProj === '__unassigned' ? 'active' : '';
    html += `<div class="unassigned-hdr">Unassigned (${unassigned.length})</div>`;
    html += unassigned.map(d => `
      <div class="proj-card ${uActive}" onclick="selectUnassigned()">
        <div class="pname" style="font-size:.8rem">${d.deviceName}</div>
        <div class="pmeta"><span class="badge ${isOnline(d.lastSeen)?'online':'offline'}">●</span></div>
      </div>`).join('');
  }

  el.innerHTML = html || '<p style="color:var(--muted);font-size:.8rem">No projects yet.</p>';
}

function showNewProjectForm() {
  openModal('New Project', `
    <div><label class="field"><span style="font-size:.75rem;color:var(--muted)">Name</span><input id="np-name" placeholder="e.g. Tara Home" /></label></div>
    <div><label class="field"><span style="font-size:.75rem;color:var(--muted)">Description</span><input id="np-desc" placeholder="Optional" /></label></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="createProject()">Create</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

async function createProject() {
  const name = document.getElementById('np-name').value.trim();
  const desc = document.getElementById('np-desc').value.trim();
  if (!name) { toast('Name required', false); return; }
  try {
    await api('POST', '/projects', { name, description: desc });
    toast('Project created');
    closeModal();
    loadAll();
  } catch(e) { toast(`Error: ${e.message}`, false); }
}

// ── Col 2: Middle panel ────────────────────────────────────────────────────
async function selectProject(id) {
  selectedProj = id;
  renderProjectList();
  const proj = await api('GET', `/projects/${id}`);
  renderMiddle(proj);
}

function selectUnassigned() {
  selectedProj = '__unassigned';
  renderProjectList();
  const unassigned = allDevices.filter(d => !d.projectId);
  document.getElementById('middle-title').textContent = 'Unassigned Devices';
  const body = document.getElementById('middle-body');
  body.innerHTML = unassigned.map(d => deviceCard(d, false)).join('') ||
    '<p style="color:var(--muted);font-size:.82rem">No unassigned devices.</p>';
}

function renderMiddle(proj) {
  document.getElementById('middle-title').textContent = proj.name;
  const body = document.getElementById('middle-body');

  const devicesHtml = proj.devices && proj.devices.length
    ? proj.devices.map(d => deviceCard(d, true, proj.id)).join('')
    : '<p style="color:var(--muted);font-size:.78rem;margin-bottom:8px">No devices in this project.</p>';

  const servicesHtml = (proj.services || []).map(s => serviceCard(s, proj.id)).join('');

  const projectQueues = getProjectQueues(proj.id);
  const queuesHtml = projectQueues.length
    ? projectQueues.map(q => queueCard(q, proj.id)).join('')
    : '<p style="color:var(--muted);font-size:.78rem">No queues yet.</p>';

  body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div class="section-title" style="margin:0">Devices</div>
      <button class="btn btn-ghost btn-sm" onclick="showAssignDevice('${proj.id}')">+ Assign</button>
    </div>
    <div id="devices-list-${proj.id}">${devicesHtml}</div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin:12px 0 6px">
      <div class="section-title" style="margin:0">Services / Brain</div>
      <button class="btn btn-ghost btn-sm" onclick="showAddService('${proj.id}')">+ Add</button>
    </div>
    <div id="services-list-${proj.id}">${servicesHtml}</div>
    <div id="svc-form-${proj.id}"></div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin:12px 0 6px">
      <div class="section-title" style="margin:0">Queues</div>
      <button class="btn btn-ghost btn-sm" onclick="showCreateQueue('${proj.id}')">+ New</button>
    </div>
    <div id="queues-list-${proj.id}">${queuesHtml}</div>
    <div id="queue-form-${proj.id}"></div>

    <div id="assign-form-${proj.id}"></div>
  `;
}

function deviceCard(d, showUnassign, projId) {
  const online = isOnline(d.lastSeen);
  return `
    <div class="dev-card ${selected===d.deviceId?'active':''}" onclick="selectDevice('${d.deviceId}')">
      <div class="dname">${d.deviceName}</div>
      <div class="did">${d.deviceId}</div>
      <div class="dmeta">
        <span class="badge ${online?'online':'offline'}">${online?'ONLINE':'OFFLINE'}</span>
        <span class="badge type">${d.deviceType}</span>
        <span style="font-size:.68rem;color:var(--muted)">v${d.firmwareVersion}</span>
        ${showUnassign ? `<button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="event.stopPropagation();unassignDevice('${projId}','${d.deviceId}')">✕</button>` : ''}
      </div>
    </div>`;
}

function serviceCard(s, projId) {
  const desc = s.description ? `<span style="font-size:.7rem;color:var(--muted);margin-left:4px">${s.description}</span>` : '';
  return `<span class="svc-tag" onclick="openServiceDetail('${projId}','${s.id}','${s.name}')">
    🧠 ${s.name}${desc}
    <span class="stag-del" onclick="event.stopPropagation();deleteService('${projId}','${s.id}')">✕</span>
  </span>`;
}

function showAddService(projId) {
  openModal('New Service', `
    <div><label style="font-size:.75rem;color:var(--muted);display:block;margin-bottom:3px">Name</label><input id="sn-name" placeholder="e.g. Tara Brain" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:.82rem;width:100%" /></div>
    <div><label style="font-size:.75rem;color:var(--muted);display:block;margin-bottom:3px">Description</label><input id="sn-desc" placeholder="Optional" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:.82rem;width:100%" /></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="createService('${projId}')">Add</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

async function createService(projId) {
  const name = document.getElementById('sn-name').value.trim();
  const desc = document.getElementById('sn-desc').value.trim();
  if (!name) { toast('Name required', false); return; }
  try {
    await api('POST', `/projects/${projId}/services`, { name, description: desc });
    toast('Service added');
    closeModal();
    const proj = await api('GET', `/projects/${projId}`);
    renderMiddle(proj);
    loadAll();
  } catch(e) { toast(`Error: ${e.message}`, false); }
}

// ── Service detail panel ───────────────────────────────────────────────────
// I/O items map to actual device pins.
// Input  → live value polled from /robot/:deviceId/pin_state
// Output → send control (toggle/number/text) → POST /robot/:deviceId/actuator

let _activeSvcId    = null;
let _activeProjId   = null;
let _activeSvcName  = null;
let _svcDevices     = [];   // devices in the project when service was opened
let _svcLiveTimer   = null;

function openServiceDetail(projId, svcId, svcName) {
  _activeSvcId   = svcId;
  _activeProjId  = projId;
  _activeSvcName = svcName;
  _svcDevices    = allDevices.filter(d => d.projectId === projId);

  document.getElementById('middle-body').style.display  = 'none';
  document.getElementById('svc-detail').classList.add('open');
  document.getElementById('svc-back-btn').style.display = '';
  document.getElementById('middle-title').textContent   = svcName;

  const saved = loadServiceState(svcId);
  renderServiceDetail(svcId, saved);

  // Poll live values every 3 s while service detail is open
  if (_svcLiveTimer) clearInterval(_svcLiveTimer);
  _svcLiveTimer = setInterval(() => pollSvcLive(svcId), 3000);
}

function closeServiceDetail() {
  if (_svcLiveTimer) { clearInterval(_svcLiveTimer); _svcLiveTimer = null; }
  _activeSvcId = null;
  document.getElementById('middle-body').style.display  = '';
  document.getElementById('svc-detail').classList.remove('open');
  document.getElementById('svc-back-btn').style.display = 'none';
  const proj = projects.find(p => p.id === _activeProjId);
  if (proj) document.getElementById('middle-title').textContent = proj?.name ?? '';
}

function saveServiceState(svcId, state) {
  localStorage.setItem(`svc_${svcId}`, JSON.stringify(state));
}
function loadServiceState(svcId) {
  return JSON.parse(localStorage.getItem(`svc_${svcId}`) || '{"inputs":[],"outputs":[],"rules":[]}');
}

// Build a flat list of {deviceId, deviceName, pin, label, direction, type} from project devices
async function getProjectPins() {
  const results = [];
  for (const d of _svcDevices) {
    const pins = await api('GET', `/robot/${d.deviceId}/pins`).catch(() => []);
    for (const p of pins) {
      if (p.direction === 'power' || p.direction === 'i2c') continue;
      results.push({ deviceId: d.deviceId, deviceName: d.deviceName, ...p });
    }
  }
  return results;
}

// ── MQTT Queue management ─────────────────────────────────────────────────
// Queues are stored in localStorage as mqttq_{projectId}_{name}
// Schema field: { fieldName, type, defaultValue, required, description }

function mqttqKey(projId, name) { return `mqttq_${projId}_${name}`; }

function getProjectQueues(projId) {
  const result = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key?.startsWith(`mqttq_${projId}_`)) continue;
    const q = JSON.parse(localStorage.getItem(key) || 'null');
    if (q) result.push(q);
  }
  return result.sort((a, b) => a.name.localeCompare(b.name));
}

function saveQueue(projId, queue) {
  localStorage.setItem(mqttqKey(projId, queue.name), JSON.stringify(queue));
}

function deleteQueue(projId, name) {
  localStorage.removeItem(mqttqKey(projId, name));
}

function queueCard(q, projId) {
  const fieldCount = (q.schema || []).length;
  const topic = q.topic || `tara/${projId}/${q.name}`;
  return `<div class="comp-card" onclick="openQueueDetail('${projId}','${q.name}')">
    <div class="cname">${q.name}</div>
    <div class="cmeta">
      <code style="font-size:.7rem">${topic}</code>
      <span style="font-size:.7rem;color:var(--muted)">${fieldCount} field${fieldCount === 1 ? '' : 's'}</span>
    </div>
    ${q.description ? `<div class="cdesc">${q.description}</div>` : ''}
  </div>`;
}

// ── Create / Edit Queue ────────────────────────────────────────────────────

let _editQueueFields = []; // working copy during create/edit

function showCreateQueue(projId) {
  _editQueueFields = [];
  openModal('New Queue', buildQueueForm(projId, null));
}

function buildQueueForm(projId, existing) {
  const isEdit = !!existing;
  const fields = isEdit ? (existing.schema || []) : _editQueueFields;
  _editQueueFields = fields;

  const fieldRows = fields.map((f, i) => `
    <div class="io-row" id="qf-row-${i}" style="flex-wrap:wrap;gap:5px;align-items:flex-start;background:var(--surface2);border-radius:5px;padding:6px 8px;margin-bottom:5px">
      <div style="display:flex;gap:5px;flex:1;min-width:200px">
        <input value="${f.fieldName}" onchange="updateQueueField(${i},'fieldName',this.value)"
          placeholder="fieldName" style="flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 7px;font-size:.75rem" />
        <select onchange="updateQueueField(${i},'type',this.value)" style="width:90px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-size:.75rem">
          ${['string','number','boolean','object','array','enum'].map(t =>
            `<option value="${t}" ${f.type===t?'selected':''}>${t}</option>`
          ).join('')}
        </select>
      </div>
      <div style="display:flex;gap:5px;flex:1;min-width:160px">
        <input value="${f.defaultValue??''}" onchange="updateQueueField(${i},'defaultValue',this.value)"
          placeholder="default" style="flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 7px;font-size:.75rem" />
        <input value="${f.description??''}" onchange="updateQueueField(${i},'description',this.value)"
          placeholder="description" style="flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 7px;font-size:.75rem" />
      </div>
      <div style="display:flex;align-items:center;gap:5px">
        <label style="font-size:.7rem;color:var(--muted);display:flex;align-items:center;gap:3px;cursor:pointer">
          <input type="checkbox" ${f.required?'checked':''} onchange="updateQueueField(${i},'required',this.checked)" /> req
        </label>
        <button class="btn btn-danger btn-sm" onclick="removeQueueField(${i},'${projId}',${isEdit?`'${existing.name}'`:'null'})">✕</button>
      </div>
    </div>`).join('');

  return `<div class="inline-form" style="margin-top:4px">
    <div><label>Queue Name</label>
      <input id="qf-name" value="${isEdit?existing.name:''}" placeholder="e.g. emotion-state" ${isEdit?'disabled':''} />
    </div>
    <div class="row">
      <div><label>MQTT Topic</label>
        <input id="qf-topic" value="${isEdit?existing.topic||'':''}" placeholder="tara/${projId}/queue-name" />
      </div>
      <div><label>Description</label>
        <input id="qf-desc" value="${isEdit?existing.description||'':''}" placeholder="Optional" />
      </div>
    </div>

    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <label style="font-size:.72rem;color:var(--muted)">Schema Fields</label>
        <button class="btn btn-ghost btn-sm" onclick="addQueueField('${projId}',${isEdit?`'${existing.name}'`:'null'})">+ Field</button>
      </div>
      <div id="qf-fields">${fieldRows || '<p style="font-size:.75rem;color:var(--muted)">No fields yet. Add a field to define the data structure.</p>'}</div>
    </div>

    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="saveQueueForm('${projId}',${isEdit?`'${existing.name}'`:'null'})">${isEdit?'Update':'Create'} Queue</button>
      <button class="btn btn-ghost btn-sm" onclick="cancelQueueForm('${projId}','${isEdit ? existing?.name ?? '' : ''}')">Cancel</button>
    </div>
  </div>`;
}

function addQueueField(projId, existingName) {
  _editQueueFields.push({ fieldName: '', type: 'string', defaultValue: '', description: '', required: false });
  refreshQueueForm(projId, existingName);
}

function removeQueueField(idx, projId, existingName) {
  _editQueueFields.splice(idx, 1);
  refreshQueueForm(projId, existingName);
}

function updateQueueField(idx, key, value) {
  if (_editQueueFields[idx]) _editQueueFields[idx][key] = value;
}

function isExisting(existingName) { return existingName && existingName !== 'null'; }

function refreshQueueForm(projId, existingName) {
  const existing = isExisting(existingName)
    ? JSON.parse(localStorage.getItem(mqttqKey(projId, existingName)) || 'null')
    : null;
  const el = isExisting(existingName)
    ? document.getElementById(`queue-detail-form-${existingName}`)
    : document.getElementById(`queue-form-${projId}`);
  if (el) el.innerHTML = buildQueueForm(projId, existing);
}

function saveQueueForm(projId, existingName) {
  const name  = isExisting(existingName)
    ? existingName
    : document.getElementById('qf-name')?.value.trim();
  const topic = document.getElementById('qf-topic')?.value.trim();
  const desc  = document.getElementById('qf-desc')?.value.trim();
  if (!name) { toast('Queue name required', false); return; }

  const schema = _editQueueFields
    .filter(f => f.fieldName.trim())
    .map(f => ({ ...f, fieldName: f.fieldName.trim() }));

  saveQueue(projId, { name, topic: topic || `tara/${projId}/${name}`, description: desc, schema });
  toast(`Queue "${name}" saved`);
  if (isExisting(existingName)) {
    // Editing from detail overlay — re-render detail
    const q = JSON.parse(localStorage.getItem(mqttqKey(projId, name)) || 'null');
    if (q) renderQueueDetail(projId, q);
  } else {
    closeModal();
  }

  // Refresh queues list in middle panel
  const qEl = document.getElementById(`queues-list-${projId}`);
  if (qEl) qEl.innerHTML = getProjectQueues(projId).map(q => queueCard(q, projId)).join('') ||
    '<p style="color:var(--muted);font-size:.78rem">No queues yet.</p>';
}

function closeQueueForm(projId) {
  const el = document.getElementById(`queue-form-${projId}`);
  if (el) el.innerHTML = '';
  _editQueueFields = [];
}

function cancelQueueForm(projId, existingName) {
  if (existingName) {
    // Inside the queue detail overlay — reset the edit form
    const q  = JSON.parse(localStorage.getItem(mqttqKey(projId, existingName)) || 'null');
    const el = document.getElementById(`queue-detail-form-${existingName}`);
    if (el && q) { _editQueueFields = structuredClone(q.schema || []); el.innerHTML = buildQueueForm(projId, q); }
  } else {
    closeModal();
  }
  _editQueueFields = [];
}

// ── Queue detail overlay ───────────────────────────────────────────────────

let _queueOverlayProjId = null;
let _queueOverlayName   = null;

function openQueueDetail(projId, name) {
  _queueOverlayProjId = projId;

function sampleValue(f) {

  return '...';
}

  }

  document.getElementById('comp-detail').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:5">

      <strong style="font-size:.95rem">⟳ ${q.name}</strong>
      <code style="font-size:.72rem;color:var(--accent);margin-left:4px">${q.topic}</code>
    </div>
    <div style="padding:18px;display:flex;flex-direction:column;gap:14px">

      <div class="card">
        <h3>Example Payload</h3>
        <pre style="background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:10px;font-size:.75rem;overflow-x:auto;color:var(--green)">${JSON.stringify(sampleDoc, null, 2)}</pre>
        ${q.description ? `<p style="font-size:.78rem;color:var(--muted);margin-top:8px">${q.description}</p>` : ''}
      </div>

      <div class="card">
        <h3>Schema</h3>
        <table>
          <thead><tr><th>Field</th><th>Type</th><th>Default</th><th>Required</th><th>Description</th></tr></thead>
          <tbody>
            ${(q.schema || []).map(f => `<tr>
              <td><strong>${f.fieldName}</strong></td>
              <td><code>${f.type}</code></td>
              <td style="color:var(--muted);font-size:.75rem">${f.defaultValue || '—'}</td>
              <td style="text-align:center">${f.required ? '✓' : ''}</td>
              <td style="color:var(--muted);font-size:.75rem">${f.description || '—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>

      <div class="card">
        <h3>Edit Queue</h3>
        <div id="queue-detail-form-${q.name}">${buildQueueForm(projId, q)}</div>

function confirmDeleteQueue(projId, name) {
  if (!confirm(`Delete queue "${name}"?`)) return;
  deleteQueue(projId, name);
  toast(`Queue "${name}" deleted`);

  if (qEl) qEl.innerHTML = getProjectQueues(projId).map(q => queueCard(q, projId)).join('') ||
    '<p style="color:var(--muted);font-size:.78rem">No queues yet.</p>';
}

// ── Service queue helpers (used by collectQueues) ──────────────────────────

function queueRow(q) {
  return `<div class="rule-row">
    <span style="font-size:.8rem">⟳</span>
    <span class="rule-desc">
      <strong>${q.pinLabel}</strong>
      <span style="color:var(--muted);margin-left:6px;font-size:.72rem">${q.devName}</span>
    </span>
    <code style="font-size:.72rem;color:var(--accent)">${q.topic}</code>
  </div>`;
}

function collectQueues(svcDevices) {
  const inputQueues  = [];
  const outputQueues = [];
  const deviceIds    = new Set(svcDevices.map(d => d.deviceId));
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key?.startsWith('queue_')) continue;
    const parts = key.split('_');
    if (parts.length < 3) continue;
    const devId    = parts[1];
    const pinLabel = parts.slice(2).join('_');
    if (!deviceIds.has(devId)) continue;
    const cfg = JSON.parse(localStorage.getItem(key) || 'null');
    if (!cfg) continue;
    const devName = svcDevices.find(d => d.deviceId === devId)?.deviceName || devId;
    const entry = { devId, devName, pinLabel, topic: cfg.topic };
    if (cfg.direction === 'output') { outputQueues.push(entry); }
    else                            { inputQueues.push(entry); }
  }
  return { inputQueues, outputQueues };
}

function buildQueueOverview(inputQueues, outputQueues) {
  if (!inputQueues.length && !outputQueues.length) return '';
  const inHtml = inputQueues.length
    ? `<div style="margin-bottom:10px">
         <div class="section-title" style="margin:0 0 6px">↗ Publishing (Input → Queue)</div>
         ${inputQueues.map(queueRow).join('')}
       </div>`
    : '';
  const outHtml = outputQueues.length
    ? `<div>
         <div class="section-title" style="margin:0 0 6px">↙ Subscribing (Queue → Output)</div>
         ${outputQueues.map(queueRow).join('')}
       </div>`
    : '';
  return `<div class="card" style="border-color:var(--accent)">
    <h3 style="color:var(--accent)">Queue Overview</h3>
    ${inHtml}${outHtml}
  </div>`;
}

function renderServiceDetail(svcId, state) {
  const { inputQueues, outputQueues } = collectQueues(_svcDevices);

  const el = document.getElementById('svc-detail');
  el.innerHTML = `
    <div style="padding:10px;display:flex;flex-direction:column;gap:14px">
      ${buildQueueOverview(inputQueues, outputQueues)}
      <!-- Components / Inputs -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span class="section-title" style="margin:0">Input Components</span>
          <button class="btn btn-ghost btn-sm" onclick="addIOPin('${svcId}','input')">+ Map</button>
        </div>
        <div id="svc-inputs-${svcId}">
          ${state.inputs.length
              ? state.inputs.map((inp, i) => ioRow(svcId, 'input', inp, i)).join('')
              : '<p style="color:var(--muted);font-size:.75rem">No input components mapped.</p>'}
        </div>
      </div>

      <!-- Components / Outputs -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span class="section-title" style="margin:0">Output Components</span>
          <button class="btn btn-ghost btn-sm" onclick="addIOPin('${svcId}','output')">+ Map</button>
        </div>
        <div id="svc-outputs-${svcId}">
          ${state.outputs.length
              ? state.outputs.map((out, i) => ioRow(svcId, 'output', out, i)).join('')
              : '<p style="color:var(--muted);font-size:.75rem">No output components mapped.</p>'}
        </div>
      </div>

      <!-- Rules -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span class="section-title" style="margin:0">Rules</span>
          <button class="btn btn-ghost btn-sm" onclick="addRule('${svcId}')">+ Add</button>
        </div>
        <div id="svc-rules-${svcId}">
          ${state.rules.length
              ? state.rules.map((r, i) => ruleRow(svcId, r, i)).join('')
              : '<p style="color:var(--muted);font-size:.75rem">No rules yet.</p>'}
        </div>
      </div>

      <div id="svc-add-form-${svcId}"></div>
    </div>`;
}

function ioRow(svcId, kind, item, idx) {
  const badge = kind === 'input'
    ? '<span class="badge input" style="font-size:.6rem">IN</span>'
    : '<span class="badge output" style="font-size:.6rem">OUT</span>';

  const deviceName = item.deviceName ? `<span style="color:var(--muted);font-size:.7rem">${item.deviceName}</span>` : '';
  const pinLabel   = item.pinLabel   ? `<code style="font-size:.7rem">${item.pinLabel}</code>` : '';
  const compName   = `<strong>${item.name || item.component || item.pinLabel}</strong>`;
  const typeTag    = item.dataType   ? `<span style="color:var(--muted);font-size:.7rem">${item.dataType}</span>` : '';

  let liveOrSend = '';
  if (kind === 'input') {
    // Live value display — updated by pollSvcLive
    liveOrSend = `<span class="live-val" id="svc-live-${item.deviceId}-${item.pinLabel}" style="min-width:40px">—</span>`;
  } else {
    // Output send control based on dataType
    const dt = (item.dataType || 'string').toLowerCase();
    if (dt === 'boolean') {
      liveOrSend = `
        <button class="btn btn-ghost btn-sm" onclick="sendActuator('${item.deviceId}','${item.pinLabel}',1)">ON</button>
        <button class="btn btn-ghost btn-sm" onclick="sendActuator('${item.deviceId}','${item.pinLabel}',0)">OFF</button>`;
    } else if (dt === 'number') {
      liveOrSend = `
        <input id="out-val-${svcId}-${idx}" type="number" style="width:72px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-size:.78rem" placeholder="0" />
        <button class="btn btn-primary btn-sm" onclick="sendActuatorInput('${item.deviceId}','${item.pinLabel}','${svcId}',${idx},'number')">Send</button>`;
    } else {
      liveOrSend = `
        <input id="out-val-${svcId}-${idx}" type="text" style="width:80px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-size:.78rem" placeholder="value" />
        <button class="btn btn-primary btn-sm" onclick="sendActuatorInput('${item.deviceId}','${item.pinLabel}','${svcId}',${idx},'string')">Send</button>`;
    }
  }

  return `<div class="rule-row">
    ${badge} ${compName} ${pinLabel} ${deviceName} ${typeTag}
    <span style="margin-left:auto;display:flex;align-items:center;gap:6px">${liveOrSend}</span>
    <span class="rule-del" onclick="removeIO('${svcId}','${kind}',${idx})">✕</span>
  </div>`;
}

async function sendActuator(deviceId, pin, value) {
  try { await api('POST', `/robot/${deviceId}/actuator`, { pin, value }); toast(`${pin} = ${value}`); }
  catch(e) { toast(`Error: ${e.message}`, false); }
}
async function sendActuatorInput(deviceId, pin, svcId, idx, dataType) {
  const el = document.getElementById(`out-val-${svcId}-${idx}`);
  if (!el) return;
  const raw   = el.value.trim();
  const value = dataType === 'number' ? Number(raw) : raw;
  await sendActuator(deviceId, pin, value);
}

async function pollSvcLive(svcId) {
  const state = loadServiceState(svcId);
  for (const inp of state.inputs) {
    if (!inp.deviceId || !inp.pinLabel) continue;
    try {
      const cache = await api('GET', `/robot/${inp.deviceId}/pin_state`);
      const val   = cache[inp.pinLabel];
      const el    = document.getElementById(`svc-live-${inp.deviceId}-${inp.pinLabel}`);
      if (el && val !== undefined) el.textContent = String(val);
    } catch { /* offline */ }
  }
}

// Map a device pin to an I/O slot

function saveIOPin(svcId, kind) {

async function selectDevice(id) {
  selected = id;

  if (selectedProj && selectedProj !== '__unassigned') {
    const proj = await api('GET', `/projects/${selectedProj}`);
    renderMiddle(proj);

  const detail = document.getElementById('detail');
  detail.className = '';
  detail.innerHTML = `
    <div class="tabs" id="tabs">
      <div class="tab active" onclick="switchTab('health')">Health</div>
      <div class="tab" onclick="switchTab('config')">Config</div>
      <div class="tab" onclick="switchTab('hardware')">Hardware</div>
    </div>
    <div id="tab-health"   class="tab-content active"></div>
    <div id="tab-config"   class="tab-content"></div>
    <div id="tab-hardware" class="tab-content"></div>

  const [d, pins] = await Promise.all([

function switchTab(name) {
  const names = ['health','config','hardware'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i]===name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// ── Tab: Hardware ──────────────────────────────────────────────────────────
function queueKey(deviceId, pinLabel) { return `queue_${deviceId}_${pinLabel}`; }
function getQueue(deviceId, pinLabel)  { return JSON.parse(localStorage.getItem(queueKey(deviceId, pinLabel)) || 'null'); }
function setQueue(deviceId, pinLabel, cfg) { localStorage.setItem(queueKey(deviceId, pinLabel), JSON.stringify(cfg)); }

function compDir(gpins) {
  const dirs = new Set(gpins.map(p => p.direction));
  if ([...dirs].every(d => d === 'power' || d === 'i2c')) return 'structural';
  if (dirs.has('input') && dirs.has('output')) return 'mixed';
  if (dirs.has('output')) return 'output';
  if (dirs.has('input'))  return 'input';
  return 'structural';
}

function renderHardware(deviceId, pins) {
  const groups = {};
  for (const p of pins) {
    const key = p.component || 'Uncategorised';
    if (!groups[key]) groups[key] = [];
    groups[key].push(p);
  }

  const dirLabels  = { input:'SENSOR', output:'ACTUATOR', mixed:'MIXED', structural:'BUS' };
  const dirClasses = { input:'input', output:'output', mixed:'', structural:'' };

  const cardsHtml = Object.entries(groups).map(([component, gpins]) => {
    const dir  = compDir(gpins);
    const pins = gpins.map(p => `<code>${p.pin}</code>`).join(' ');
    const activeQ = gpins.find(p => getQueue(deviceId, p.label));
    const qBadge  = activeQ ? `<span style="font-size:.68rem;color:var(--accent)">⟳ ${getQueue(deviceId, activeQ.label)?.topic}</span>` : '';
    return `<div class="comp-card" onclick="openComponentDetail('${deviceId}','${encodeURIComponent(component)}')">
      <div class="cname">${component}</div>
      <div class="cmeta">
        <span class="badge ${dirClasses[dir]}" style="${dirClasses[dir] ? '' : 'background:var(--surface2);color:var(--muted)'}">${dirLabels[dir]}</span>
        ${pins} ${qBadge}
      </div>
    </div>`;
  }).join('');

  document.getElementById('tab-hardware').innerHTML = `
    <div style="padding:4px 0 8px;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:.72rem;color:var(--muted)">Click a component to configure pins and queue</span>
      <button class="btn btn-primary btn-sm" onclick="showAddPin('${deviceId}')">+ Add Pin</button>
    </div>
    ${pins.length ? cardsHtml : '<p style="color:var(--muted);font-size:.82rem">No components registered.</p>'}
    <div id="add-pin-form"></div>`;
}

// ── Component detail overlay ───────────────────────────────────────────────

let _compDeviceId = null;

function openComponentDetail(deviceId, componentEncoded) {
  const component = decodeURIComponent(componentEncoded);
  _compDeviceId   = deviceId;
  const pins = devicePins.filter(p => p.component === component);
  renderComponentDetail(deviceId, component, pins);
  document.getElementById('comp-detail').classList.add('open');
}

function closeComponentDetail() {
  document.getElementById('comp-detail').classList.remove('open');
  _compDeviceId = null;
}

function renderComponentDetail(deviceId, component, pins) {
  const inputPins  = pins.filter(p => p.direction === 'input');
  const outputPins = pins.filter(p => p.direction === 'output');
  const busPins    = pins.filter(p => p.direction === 'i2c' || p.direction === 'power');

  function pinQueueBlock(p, kind) {
    const q = getQueue(deviceId, p.label);
    const defaultTopic = kind === 'output'
      ? `tara/device/${deviceId}/${p.label}/set`
      : `tara/device/${deviceId}/${p.label}/state`;
    return `
      <div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
          ${dirBadge(p.direction)}
          <strong>${p.label}</strong>
          <code style="font-size:.72rem">GPIO ${p.pin}</code>
          ${p.protocol ? `<span style="font-size:.72rem;color:var(--muted)">${p.protocol}</span>` : ''}
          ${p.notes    ? `<span style="font-size:.72rem;color:var(--muted)">${p.notes}</span>` : ''}
        </div>
        <label style="font-size:.7rem;color:var(--muted);display:block;margin-bottom:4px">
          ${kind === 'output' ? '↙ Subscribe topic (receives commands from queue)' : '↗ Publish topic (sends data to queue)'}
        </label>
        <div style="display:flex;gap:6px">
          <input id="q-${deviceId}-${p.label}"
            value="${q?.topic || ''}"
            placeholder="${defaultTopic}"
            style="flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-size:.78rem" />
          <button class="btn btn-primary btn-sm" onclick="saveQueueTopic('${deviceId}','${p.label}','${component}','${kind}')">Save</button>
          ${q ? `<button class="btn btn-ghost btn-sm" onclick="clearQueueTopic('${deviceId}','${p.label}','${component}')">Clear</button>` : ''}
        </div>
        ${q ? `<p style="font-size:.7rem;color:var(--accent);margin-top:4px">⟳ Active: <code>${q.topic}</code></p>` : ''}
      </div>`;
  }

  function pinSection(title, secPins, kind) {
    if (!secPins.length) return '';
    return `<div class="card"><h3>${title}</h3>${secPins.map(p => pinQueueBlock(p, kind)).join('')}</div>`;
  }

  document.getElementById('comp-detail').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:5">
      <button class="btn btn-ghost btn-sm" onclick="closeComponentDetail()">← Back</button>
      <strong style="font-size:.95rem">${component}</strong>
    </div>
    <div style="padding:18px;display:flex;flex-direction:column;gap:14px">
      ${pinSection('Input Pins — Publish Data to Queue', inputPins, 'input')}
      ${pinSection('Output Pins — Subscribe Commands from Queue', outputPins, 'output')}
      ${busPins.length ? `<div class="card"><h3>Bus / Power Pins</h3>
        <table><thead><tr><th>GPIO</th><th>Label</th><th>Direction</th><th>Protocol</th></tr></thead>
        <tbody>${busPins.map(p=>`<tr><td><code>${p.pin}</code></td><td>${p.label}</td><td>${dirBadge(p.direction)}</td><td style="color:var(--muted);font-size:.72rem">${p.protocol||'—'}</td></tr>`).join('')}
        </tbody></table></div>` : ''}
      <div class="card" style="border-color:var(--red)">
        <h3 style="color:var(--red)">Danger Zone</h3>
        <p style="font-size:.78rem;color:var(--muted);margin-bottom:10px">Remove all ${pins.length} pins of this component.</p>
        <button class="btn btn-danger btn-sm" onclick="deleteComponent('${deviceId}','${encodeURIComponent(component)}')">Delete Component</button>
      </div>
    </div>`;
}

function saveQueueTopic(deviceId, pinLabel, component, kind) {
  const el = document.getElementById(`q-${deviceId}-${pinLabel}`);
  const topic = el?.value.trim();
  if (!topic) { toast('Topic required', false); return; }
  setQueue(deviceId, pinLabel, { topic, direction: kind });
  toast('Queue topic saved');
  renderComponentDetail(deviceId, component, devicePins.filter(p => p.component === component));
  renderHardware(deviceId, devicePins);
}

function clearQueueTopic(deviceId, pinLabel, component) {
  localStorage.removeItem(queueKey(deviceId, pinLabel));
  toast('Queue cleared');
  renderComponentDetail(deviceId, component, devicePins.filter(p => p.component === component));
  renderHardware(deviceId, devicePins);
}

async function deleteComponent(deviceId, componentEncoded) {
  const component = decodeURIComponent(componentEncoded);
  const pins = devicePins.filter(p => p.component === component);
  if (!confirm(`Delete all ${pins.length} pins of "${component}"?`)) return;
  try {
    for (const p of pins) {
      await api('DELETE', `/robot/${deviceId}/pins/${encodeURIComponent(p.pin)}`);
      localStorage.removeItem(queueKey(deviceId, p.label));
    }
    toast(`${component} deleted`);
    devicePins = await api('GET', `/robot/${deviceId}/pins`);
    closeComponentDetail();
    renderHardware(deviceId, devicePins);
  } catch(e) { toast(`Error: ${e.message}`, false); }
}
function showAddPin(deviceId) {
  openModal('Add / Update Pin', `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:3px">GPIO / Pin</label><input id="np-pin" placeholder="e.g. 4, 3V3, GND" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:.82rem;width:100%" /></div>
      <div><label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:3px">Label</label><input id="np-label" placeholder="e.g. DHT11_DATA" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:.82rem;width:100%" /></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:3px">Direction</label>
        <select id="np-dir" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:.82rem;width:100%">
          <option value="input">Input</option><option value="output">Output</option><option value="i2c">I2C</option><option value="power">Power</option>
        </select>
      </div>
      <div><label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:3px">Protocol</label>
        <select id="np-proto" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:.82rem;width:100%">
          <option value="">—</option><option>DIGITAL</option><option>ANALOG</option><option>I2C</option><option>PWM</option><option>UART</option><option>SPI</option>
        </select>
      </div>
    </div>
    <div><label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:3px">Component</label><input id="np-component" placeholder="e.g. DHT11, Relay, LED" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:.82rem;width:100%" /></div>
    <div><label style="font-size:.72rem;color:var(--muted);display:block;margin-bottom:3px">Notes</label><input id="np-notes" placeholder="Optional" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-size:.82rem;width:100%" /></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="savePin('${deviceId}')">Save Pin</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}
async function savePin(deviceId) {
  const pin=document.getElementById('np-pin').value.trim(), label=document.getElementById('np-label').value.trim();
  const direction=document.getElementById('np-dir').value, protocol=document.getElementById('np-proto').value||null;
  const component=document.getElementById('np-component').value.trim(), notes=document.getElementById('np-notes').value.trim()||null;
  if (!pin||!label||!component){toast('Pin, label and component required',false);return;}
  try {
    await api('POST',`/robot/${deviceId}/pins`,{pin,label,direction,component,protocol,notes});
    toast('Pin saved');
    closeModal();
    devicePins = await api('GET', `/robot/${deviceId}/pins`);
    renderHardware(deviceId, devicePins);
  } catch(e){toast(`Error: ${e.message}`,false);}
}
async function deletePin(deviceId,pin) {
  if (!confirm(`Delete pin ${pin}?`)) return;
  try {
    await api('DELETE',`/robot/${deviceId}/pins/${encodeURIComponent(pin)}`);
    toast('Pin removed'); devicePins=await api('GET',`/robot/${deviceId}/pins`);
    renderHardware(deviceId,devicePins);
  } catch(e){toast(`Error: ${e.message}`,false);}
}

// ── Live pin polling ───────────────────────────────────────────────────────
async function pollPinState() {
  if (!selected) return;
  try {
    const state=await api('GET',`/robot/${selected}/pin_state`);
    Object.entries(state).forEach(([label,val])=>{
      const el=document.getElementById(`live-${selected}-${label}`);
      if (el) el.textContent=String(val);
    });
  } catch { /* offline */ }
}

// ── Init ───────────────────────────────────────────────────────────────────
loadAll();
setInterval(loadAll, 30000);
setInterval(pollPinState, 3000);
</script>
